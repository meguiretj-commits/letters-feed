name: Update feed
on:
  schedule:
    - cron: "0 13 1,15 * *"  # 1st and 15th of each month, 13:00 UTC
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python letters_feed.py
      - name: Commit and push if changed
        run: |
          git config user.name "letters-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add feed.xml letters.json
          git diff --cached --quiet || git commit -m "Update feed $(date -u +%F)"
          git push
